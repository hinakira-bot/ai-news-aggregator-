name: Daily Threads Post

on:
  schedule:
    - cron: '0 12 * * *'   # UTC 12:00 = JST 21:00（ニュース収集の1時間後にThreads投稿）
  workflow_dispatch:        # 手動トリガー

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  threads-post:
    name: Generate & Post to Threads
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3-flash-preview
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # トークン有効性チェック（失敗したら即通知して中断）
      - name: Verify Threads access token
        id: token-check
        run: |
          RESPONSE=$(curl -s "https://graph.threads.net/v1.0/me?fields=id,username&access_token=${THREADS_ACCESS_TOKEN}")
          echo "API Response: $RESPONSE"

          # エラーチェック
          if echo "$RESPONSE" | grep -q '"error"'; then
            ERROR_MSG=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['error']['message'])" 2>/dev/null || echo "Unknown error")
            echo "::error::Threads token is invalid: $ERROR_MSG"
            echo "token_valid=false" >> $GITHUB_OUTPUT
            echo "error_message=$ERROR_MSG" >> $GITHUB_OUTPUT
            exit 1
          fi

          USERNAME=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('username','unknown'))" 2>/dev/null || echo "unknown")
          echo "✅ Token valid for @$USERNAME"
          echo "token_valid=true" >> $GITHUB_OUTPUT

      - name: Generate Threads post content
        run: node scripts/generate-threads-post.mjs

      - name: Post to Threads
        run: node scripts/post-threads.mjs

  # 失敗時にGitHub Issueで通知
  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: threads-post
    if: failure()
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `⚠️ Threads自動投稿が失敗しました (${new Date().toISOString().slice(0,10)})`;

            // 同じタイトルのOpen Issueがあれば作成しない
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'threads-bot'
            });
            if (existing.data.some(i => i.title.includes('Threads自動投稿が失敗'))) {
              console.log('既存のIssueがあるためスキップ');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: [
                '## Threads自動投稿が失敗しました',
                '',
                `**日時**: ${new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' })}`,
                `**ワークフロー**: [実行ログ](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '### 考えられる原因',
                '- 🔑 **アクセストークンの期限切れ** → GitHub Secretsで `THREADS_ACCESS_TOKEN` を更新してください',
                '- 📡 **Threads API障害** → [Meta Status](https://metastatus.com/) を確認',
                '- 📰 **Pick記事がない** → 当日のニュース収集が正常に完了しているか確認',
                '',
                '### トークン更新手順',
                '1. [Meta Developer Console](https://developers.facebook.com/) でアクセストークンを再生成',
                '2. GitHub → Settings → Secrets → `THREADS_ACCESS_TOKEN` を更新',
                '3. Actions タブから手動で再実行（workflow_dispatch）',
              ].join('\n'),
              labels: ['threads-bot', 'bug']
            });
