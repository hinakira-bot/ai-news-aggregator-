name: Daily Collect & Deploy

on:
  schedule:
    - cron: '0 11 * * *'  # UTC 11:00 = JST 20:00（毎晩記事収集＆デプロイ）
  workflow_dispatch:        # 手動トリガー
  push:
    branches: [main]

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  # 記事収集（スケジュール・手動のみ。pushでは実行しない）
  collect:
    name: Collect Articles
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3-flash-preview
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run collection pipeline
        run: node scripts/collect.mjs

  # ビルド＆デプロイ（すべてのトリガーで実行）
  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: collect
    if: always() && (needs.collect.result == 'success' || needs.collect.result == 'skipped')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate static data from DB
        run: node scripts/generate-data.mjs

      - name: Build static site
        run: npm run build

      - name: Deploy to Lolipop via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /hinakira/ai-news/
          dangerous-clean-slate: false

      - name: Notify search engines (sitemap ping + IndexNow)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node scripts/ping-search-engines.mjs
